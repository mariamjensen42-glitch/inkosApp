name: Run InkOS Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  inkos-tests:
    name: InkOS Conversion Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run unit tests
      run: ./gradlew test
      
    - name: Run instrumented tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        script: ./gradlew connectedAndroidTest
        
    - name: Generate test report
      if: always()
      run: ./gradlew jacocoTestReport
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: inkos-test-results
        path: |
          app/build/reports/tests/
          app/build/reports/androidTests/
          app/build/reports/jacoco/
          
    - name: Comment test results on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const testReport = fs.readFileSync('app/build/reports/tests/test/index.html', 'utf8');
          
          // Extract test summary
          const totalMatch = testReport.match(/tests.*?(\d+)/);
          const passedMatch = testReport.match(/successes.*?(\d+)/);
          const failedMatch = testReport.match(/failures.*?(\d+)/);
          
          const body = `
          ## 🧪 Test Results
          
          | Metric | Count |
          |--------|-------|
          | Total Tests | ${totalMatch ? totalMatch[1] : 'N/A'} |
          | Passed | ${passedMatch ? passedMatch[1] : 'N/A'} |
          | Failed | ${failedMatch ? failedMatch[1] : 'N/A'} |
          
          📊 Full report available in artifacts.
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
