name: Code Coverage & Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run tests with coverage
      run: ./gradlew test jacocoTestReport
      
    - name: Check coverage threshold
      run: |
        # Extract coverage percentage from report
        COVERAGE=$(grep -o 'Total.*?%' app/build/reports/jacoco/test/html/index.html | grep -o '[0-9]*%' | head -1)
        echo "Code Coverage: $COVERAGE"
        
        # Check if coverage meets threshold (e.g., 70%)
        COVERAGE_NUM=$(echo $COVERAGE | sed 's/%//')
        if [ $(echo "$COVERAGE_NUM < 70" | bc) -eq 1 ]; then
          echo "❌ Code coverage is below 70% threshold"
          exit 1
        else
          echo "✅ Code coverage meets 70% threshold"
        fi
        
    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: app/build/reports/jacoco/
        
    - name: Add coverage comment to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverageReport = fs.readFileSync('app/build/reports/jacoco/test/html/index.html', 'utf8');
          
          // Extract coverage data
          const coverageMatch = coverageReport.match(/Total.*?(\d+\.?\d*)%/);
          const coverage = coverageMatch ? coverageMatch[1] : 'N/A';
          
          const body = `
          ## 📊 Code Coverage Report
          
          **Coverage:** ${coverage}%
          
          | Status | Description |
          |--------|-------------|
          | ✅ | Coverage meets minimum threshold (70%) |
          
          📁 Full coverage report available in artifacts.
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
          
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Check code style
      run: ./gradlew ktlintCheck
      
    - name: Run static analysis
      run: ./gradlew detekt
      
    - name: Run Android Lint
      run: ./gradlew lint
      
    - name: Check for security vulnerabilities
      run: ./gradlew dependencyCheckAnalyze
      
    - name: Generate quality report
      if: always()
      run: |
        echo "## Quality Gates Summary" > quality-report.md
        echo "" >> quality-report.md
        echo "### Code Style (ktlint)" >> quality-report.md
        if [ -f app/build/reports/ktlint/ktlintMainSourceSetCheck.xml ]; then
          echo "✅ ktlint check passed" >> quality-report.md
        else
          echo "❌ ktlint check failed" >> quality-report.md
        fi
        echo "" >> quality-report.md
        echo "### Static Analysis (detekt)" >> quality-report.md
        if [ -f app/build/reports/detekt/detekt.html ]; then
          echo "✅ detekt analysis passed" >> quality-report.md
        else
          echo "❌ detekt analysis failed" >> quality-report.md
        fi
        echo "" >> quality-report.md
        echo "### Android Lint" >> quality-report.md
        if [ -f app/build/reports/lint-results-debug.html ]; then
          echo "✅ Android Lint passed" >> quality-report.md
        else
          echo "❌ Android Lint failed" >> quality-report.md
        fi
        
    - name: Upload quality reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: quality-reports
        path: |
          app/build/reports/ktlint/
          app/build/reports/detekt/
          app/build/reports/lint-results/
          quality-report.md
